<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bakerization — We Bake the Future</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=DM+Serif+Display:ital@0;1&family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Manrope:wght@300;400;500;600;700;800&family=Noto+Sans+JP:wght@300;400;500;600;700;800&family=Noto+Serif+JP:wght@300;400;500;600;700&family=Shippori+Mincho:wght@400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&family=Zen+Kaku+Gothic+Antique:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500;600&display=swap"
  />
  <style>
    html, body, #root { margin: 0; padding: 0; min-height: 100%; background: #0e0700; }
    body { font-family: "Zen Kaku Gothic Antique", "Noto Sans JP", sans-serif; }
    * { box-sizing: border-box; }

    /* Editorial highlighter ・ 蛍光ペン */
    .mk {
      padding: 0 .14em;
      transition: background 360ms cubic-bezier(.2,.7,.2,1), color 240ms ease;
      background-image: linear-gradient(
        180deg,
        transparent 0%, transparent 55%,
        rgba(232,154,31,0) 55%, rgba(232,154,31,0) 100%
      );
      background-size: 100% 100%;
      background-repeat: no-repeat;
    }
    .marker-on .mk {
      background-image: linear-gradient(
        180deg,
        transparent 0%, transparent 52%,
        var(--mk-color, rgba(232,154,31,.55)) 52%,
        var(--mk-color-end, rgba(232,154,31,.42)) 92%,
        transparent 92%, transparent 100%
      );
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="src/tweaks-panel.jsx"></script>
  <script type="text/babel" src="src/variants.jsx"></script>
  <script type="text/babel" src="src/sections.jsx"></script>
  <script type="text/babel" src="src/sections2.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
